<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Canadian Rockies Expedition — Libro de viaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;750&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#0a1622;--ink2:#0f2233;--glacier:#155e75;--glacier2:#2e7fb8;--glacier3:#8fd0df;
  --ice:#d7eef4;--forest:#2d6a4f;--forest2:#40916c;--text:#12263a;--muted:#5a7183;--faint:#8aa0b0;--line:#e4edf2;--snow:#f5fafc;
  --serif:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  --grad:linear-gradient(135deg,#155e75 0%,#2e7fb8 48%,#40916c 100%);
  --grad-ice:linear-gradient(135deg,#8fd0df,#d7eef4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{size:A4;margin:14mm 13mm 12mm}
@page bleed{margin:0}
html,body{background:#fff;color:var(--text);font-family:var(--sans);line-height:1.5;font-size:11px}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;line-height:1.1;color:var(--ink)}
img{display:block}

.page{position:relative;page-break-after:always}
.page:last-child{page-break-after:auto}
.page.bleed{page:bleed;width:210mm;height:297mm;overflow:hidden;padding:0}
.pnum{display:none}
/* flowing pages: keep individual blocks whole; let grids/groups break between items */
.card,.stat,.gcard,.check,.rbox,.rec,.qr,.xcard,.crew-card,.day-hero,.summary-box,.crew-box,.flight,.day-summary,.wchip{break-inside:avoid}
.eyebrow{font-weight:750;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--glacier);display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:20px;height:2px;background:currentColor}
.sec-title{font-size:30px;margin-top:10px;letter-spacing:-.01em}
.sec-lead{color:var(--muted);font-size:11.5px;margin-top:8px;max-width:150mm}
.divider{height:2px;background:var(--grad);border-radius:2px;margin:12px 0 18px;width:60mm}

/* ---------- COVER ---------- */
.cover{color:#fff}
.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,18,28,.32),rgba(6,18,28,.35) 45%,rgba(6,18,28,.85))}
.cover .inner{position:absolute;left:18mm;right:18mm;bottom:22mm;z-index:2}
.cover .top{position:absolute;left:18mm;right:18mm;top:18mm;z-index:2;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:600}
.cover .glyph{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.4);display:grid;place-items:center;font-size:17px}
.cover h1{color:#fff;font-size:62px;line-height:.98;letter-spacing:-.02em;text-shadow:0 6px 40px rgba(0,0,0,.4)}
.cover .sub{color:rgba(255,255,255,.92);font-size:14px;margin-top:16px;max-width:150mm}
.cover .dates{margin-top:20px;display:inline-block;font-weight:650;font-size:12px;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.34);padding:9px 16px;border-radius:999px}
.cover .route{margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.24);font-size:11px;color:rgba(255,255,255,.82);letter-spacing:.02em}
.cover .crew-line{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.cover .crew-line span{font-size:10px;color:rgba(255,255,255,.92);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.32);padding:5px 12px;border-radius:999px}
.cover .crew-line b{font-weight:700}
.crew-box{margin-top:16px;border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.crew-box h4{font-family:var(--serif);font-size:15px;margin-bottom:10px}
.crew-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.crew-card{background:var(--snow);border:1px solid var(--line);border-radius:12px;padding:13px 10px;text-align:center}
.crew-card b{font-family:var(--serif);font-size:15px;color:var(--ink);display:block}
.crew-card span{font-size:9.5px;color:var(--muted)}

/* ---------- TOC ---------- */
.toc{list-style:none;margin-top:6px}
.toc li{display:flex;align-items:baseline;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.toc .n{font-family:var(--serif);font-size:16px;color:var(--glacier2);width:26px;flex:none}
.toc .t{font-weight:650;color:var(--ink)}
.toc .d{flex:1;border-bottom:1px dotted #c9d8e0;margin:0 6px;transform:translateY(-3px)}
.toc .p{color:var(--muted);font-weight:600}

/* ---------- STATS ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:6px}
.stat{border:1px solid var(--line);border-radius:14px;padding:14px 15px;background:var(--snow);position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad)}
.stat .ic{font-size:16px}
.stat .v{font-family:var(--serif);font-size:26px;line-height:1;margin-top:6px;color:var(--ink)}
.stat .l{font-weight:700;font-size:11px;margin-top:5px}
.stat .s{font-size:9.5px;color:var(--faint);margin-top:1px}
.summary-box{margin-top:16px;background:var(--grad-ice);border-radius:16px;padding:18px 20px}
.summary-box h3{font-size:15px}
.summary-box p{font-size:11px;color:var(--ink2);margin-top:6px}
.flight{margin-top:14px;border:1px dashed var(--line);border-radius:14px;padding:14px 16px;font-size:10.5px}
.flight b{color:var(--glacier)}

/* ---------- DAY PAGE ---------- */
.day-hero{position:relative;height:58mm;border-radius:16px;overflow:hidden;margin-bottom:11px}
.day-hero img{width:100%;height:100%;object-fit:cover}
.day-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,18,28,.15),rgba(6,18,28,.78))}
.day-hero .lbl{position:absolute;left:16px;bottom:14px;right:16px;z-index:2;color:#fff}
.day-hero .badge{display:inline-block;font-size:8.5px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;background:var(--grad);padding:4px 10px;border-radius:999px}
.day-hero h2{color:#fff;font-size:26px;margin-top:8px}
.day-hero .rt{color:rgba(255,255,255,.9);font-size:10px;margin-top:3px;font-weight:600}
.day-hero .num{position:absolute;top:14px;left:16px;z-index:2;width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);backdrop-filter:blur(4px);display:grid;place-items:center;color:#fff}
.day-hero .num b{font-family:var(--serif);font-size:20px;line-height:1}
.day-hero .metrics{position:absolute;top:14px;right:16px;z-index:2;display:flex;gap:8px}
.day-hero .metrics .m{background:rgba(10,22,34,.5);border:1px solid rgba(255,255,255,.28);border-radius:10px;padding:6px 9px;color:#fff;text-align:center}
.day-hero .metrics .m b{font-family:var(--serif);font-size:13px;display:block;line-height:1}
.day-hero .metrics .m small{font-size:7.5px;letter-spacing:.06em;text-transform:uppercase;opacity:.85}
.day-summary{font-size:10.5px;color:var(--muted);border-left:3px solid var(--glacier2);padding-left:11px;margin-bottom:11px}
.day-cols{display:grid;grid-template-columns:1.15fr 1fr;gap:11px}
.card{border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:#fff;margin-bottom:9px}
.card h4{font-family:var(--sans);font-size:9px;font-weight:750;letter-spacing:.1em;text-transform:uppercase;color:var(--glacier);margin-bottom:8px}
.sched{list-style:none}
.sched li{display:grid;grid-template-columns:34px 1fr;gap:8px;padding:5px 0;border-bottom:1px dotted var(--line)}
.sched li:last-child{border-bottom:none}
.sched .t{font-weight:750;font-size:9.5px;color:var(--ink);font-variant-numeric:tabular-nums}
.sched .c b{font-size:9.8px;font-weight:700;display:block}
.sched .c span{font-size:9px;color:var(--muted);line-height:1.35}
.kv .r{font-size:9.6px;margin-bottom:6px;line-height:1.4}
.kv .r b{display:block;font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:750}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:8.6px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--snow);border:1px solid var(--line)}
.wchip{display:flex;align-items:center;gap:10px;background:var(--grad-ice);border-radius:11px;padding:9px 11px;margin-bottom:8px}
.wchip .tmp{font-family:var(--serif);font-size:20px;line-height:1}
.wchip .wd{font-size:9px;font-weight:600;color:var(--ink2)}
.alerts{list-style:none}
.alerts li{font-size:9px;background:#fff8f4;border:1px solid #ffe0d3;border-left:3px solid #f97316;border-radius:8px;padding:6px 9px;margin-bottom:5px}
.alt-t{width:100%;border-collapse:collapse;font-size:8.6px;margin-top:2px}
.alt-t th{text-align:left;font-size:7px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:750;padding:4px 5px;border-bottom:1px solid var(--line)}
.alt-t td{padding:4px 5px;border-bottom:1px solid var(--line)}
.alt-t td.r,.alt-t th.r{text-align:right}
.alt-t tr.rec td{background:#eaf3f7;font-weight:750}
.alt-t tr.cl td{color:#9fb0bd;text-decoration:line-through}

/* ---------- GALLERY / GRIDS ---------- */
.gal{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:4px}
.gcard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.gcard .im{aspect-ratio:4/3;overflow:hidden;position:relative}
.gcard .im img{width:100%;height:100%;object-fit:cover}
.gcard .tp{position:absolute;top:7px;left:7px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:rgba(10,22,34,.55);color:#fff;padding:3px 7px;border-radius:999px}
.gcard .bd{padding:9px 11px}
.gcard h4{font-family:var(--serif);font-size:12.5px}
.gcard p{font-size:8.8px;color:var(--muted);margin-top:4px;line-height:1.35}
.gcard .mt{display:flex;justify-content:space-between;margin-top:7px;font-size:8.2px;font-weight:650;color:var(--glacier)}

/* ---------- CHECKLIST ---------- */
.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:4px}
.check{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--snow)}
.check h4{font-family:var(--serif);font-size:13px;color:var(--ink);margin-bottom:9px}
.check ul{list-style:none}
.check li{font-size:9.6px;padding:4px 0 4px 20px;position:relative;border-bottom:1px dotted var(--line)}
.check li:last-child{border-bottom:none}
.check li::before{content:"☐";position:absolute;left:2px;top:3px;color:var(--glacier2);font-size:11px}

/* ---------- BUDGET ---------- */
.btable{width:100%;border-collapse:collapse;margin-top:6px;font-size:10.5px}
.btable th{text-align:left;font-size:8.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:9px 10px;border-bottom:2px solid var(--line)}
.btable td{padding:9px 10px;border-bottom:1px solid var(--line)}
.btable td.r,.btable th.r{text-align:right;font-variant-numeric:tabular-nums}
.btable tr.total td{font-weight:750;color:var(--ink);border-top:2px solid var(--ink);border-bottom:none;font-size:12px}
.budget-note{font-size:9px;color:var(--muted);margin-top:10px;font-style:italic}

/* ---------- RESTAURANTS + REC ---------- */
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.rbox{border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.rbox h4{font-family:var(--serif);font-size:14px;color:var(--glacier);margin-bottom:8px}
.rbox ul{list-style:none}
.rbox li{font-size:9.8px;padding:4px 0;border-bottom:1px dotted var(--line)}
.rbox li:last-child{border-bottom:none}
.rec{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;break-inside:avoid}
.rec h4{font-family:var(--serif);font-size:13px;margin-bottom:6px}
.rec ul{list-style:none}
.rec li{font-size:9.5px;padding:3px 0 3px 15px;position:relative;color:var(--text)}
.rec li::before{content:"▸";position:absolute;left:0;color:var(--forest2)}

/* ---------- QR ---------- */
.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:4px}
.qr{border:1px solid var(--line);border-radius:12px;padding:11px;text-align:center;background:#fff;break-inside:avoid}
.qr img{width:70px;height:70px;margin:0 auto 8px}
.qr .tp{font-size:7.5px;font-weight:750;text-transform:uppercase;letter-spacing:.06em;color:var(--glacier)}
.qr h5{font-family:var(--serif);font-size:10px;margin-top:3px;line-height:1.2;color:var(--ink)}
.qr .ch{font-size:8px;color:var(--muted);margin-top:3px}
.xgroup{margin-bottom:11px}
.xday{break-after:avoid}
.xday{font-family:var(--serif);font-size:12px;color:var(--glacier);border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:7px}
.xcards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.xcard{border:1px solid var(--line);border-radius:9px;padding:8px 10px;break-inside:avoid}
.xtop{display:flex;justify-content:space-between;gap:6px;align-items:baseline}
.xtop b{font-size:10px;color:var(--ink)}
.xtop span{font-size:7.5px;color:var(--faint);white-space:nowrap}
.xcard p{font-size:8.3px;color:var(--muted);margin-top:3px;line-height:1.32}
.xhow{font-size:8px;color:var(--text);margin-top:4px}
.xhow b{color:var(--glacier)}

/* ---------- BACK ---------- */
.back{background:var(--ink);color:rgba(255,255,255,.8);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.back h2{color:#fff;font-size:34px;max-width:130mm}
.back p{font-size:11px;margin-top:14px;max-width:120mm;color:rgba(255,255,255,.7)}
.back .glyph{font-size:40px;margin-bottom:16px}
.back .line{width:60mm;height:2px;background:var(--grad);border-radius:2px;margin:22px 0}
</style>
</head>
<body>
<div id="doc"></div>

<script src="assets/js/data.js"></script>
<script>
(function(){
  var D=window.ITINERARY, doc=document.getElementById("doc");
  var esc=function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});};
  var pages=[]; function P(cls,html){pages.push('<section class="page '+(cls||"")+'">'+html+"</section>");}
  var TYPE={city:"Ciudad",lake:"Lago",glacier:"Glaciar",waterfall:"Cascada",mountain:"Montaña",trek:"Trek"};

  /* COVER */
  P("bleed cover",
    '<img src="assets/img/photos/hero_1.jpg" alt="">'+
    '<div class="veil"></div>'+
    '<div class="top"><span>Libro de viaje · Edición privada</span><span class="glyph">🏔️</span></div>'+
    '<div class="inner"><div style="font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#d7eef4;font-weight:700">Rocosas Canadienses · Alberta</div>'+
    '<h1>'+esc(D.meta.title)+'</h1>'+
    '<div class="sub">'+esc(D.meta.tagline)+'</div>'+
    '<div class="dates">'+esc(D.meta.dates)+' · '+esc(D.meta.party)+'</div>'+
    '<div class="route">'+esc(D.meta.routeLine)+'</div>'+
    (D.meta.travelers ? '<div class="crew-line">'+D.meta.travelers.map(function(t){return '<span><b>'+esc(t.name)+'</b> · '+t.age+' años</span>';}).join("")+'</div>' : '')+
    '</div>');

  /* TOC */
  var toc=[
    ["01","Resumen ejecutivo","03"],
    ["02","La ruta día a día","04"],
    ["03","Atracciones principales","12"],
    ["04","Checklists de equipaje","14"],
    ["05","Presupuesto estimado","15"],
    ["06","Restaurantes por ciudad","16"],
    ["07","Recomendaciones & seguridad","17"],
    ["08","Videos (códigos QR)","18"]
  ];
  P("",'<div class="eyebrow">Índice</div><h1 class="sec-title">Contenido</h1><div class="divider"></div>'+
    '<ul class="toc">'+toc.map(function(t){return '<li><span class="n">'+t[0]+'</span><span class="t">'+t[1]+'</span><span class="d"></span><span class="p">pág. '+t[2]+'</span></li>';}).join("")+'</ul>'+
    '<div style="margin-top:22px" class="flight"><b>✈️ Vuelos</b><br>'+esc(D.meta.flight.out)+'<br>'+esc(D.meta.flight.layover)+'<br>Llegada: '+esc(D.meta.flight.arrive)+'</div>'+
    footer("Índice"));

  /* RESUMEN */
  P("",'<div class="eyebrow">01 · Resumen ejecutivo</div><h1 class="sec-title">El viaje en números</h1><div class="divider"></div>'+
    '<div class="stat-grid">'+D.stats.map(function(s){return '<div class="stat"><div class="ic">'+s.icon+'</div><div class="v">'+esc(s.value)+'</div><div class="l">'+esc(s.label)+'</div><div class="s">'+esc(s.sub)+'</div></div>';}).join("")+'</div>'+
    '<div class="summary-box"><h3>Una expedición por las Rocosas canadienses</h3><p>'+esc(D.meta.subtitle)+'. '+esc(D.meta.tagline)+'</p></div>'+
    '<div style="margin-top:16px" class="two"><div class="rbox"><h4>Ciudades base</h4><ul>'+D.meta.baseCities.map(function(c){return '<li>📍 '+esc(c)+'</li>';}).join("")+'</ul></div>'+
    '<div class="rbox"><h4>Ruta general</h4><ul><li>'+esc(D.meta.routeLine).split(" → ").join('</li><li>→ ')+'</li></ul></div></div>'+
    (D.meta.travelers ? '<div class="crew-box"><h4>La expedición</h4><div class="crew-grid">'+D.meta.travelers.map(function(t){return '<div class="crew-card"><b>'+esc(t.name)+'</b><span>'+t.age+' años</span></div>';}).join("")+'</div></div>' : '')+
    footer("Resumen ejecutivo"));

  /* DAYS */
  D.days.forEach(function(d){
    var heroId=(d.routeStops&&d.routeStops[0])||"banff_town";
    // choose a representative image: last hikey/lake stop if any
    var pic=heroImg(d);
    var left='<div class="card"><h4>🕘 Itinerario sugerido</h4><ul class="sched">'+
      d.schedule.map(function(s){return '<li><div class="t">'+esc(s.time)+'</div><div class="c"><b>'+s.icon+' '+esc(s.title)+'</b>'+(s.detail?'<span>'+esc(s.detail)+'</span>':"")+'</div></li>';}).join("")+'</ul></div>';
    if(d.alternatives) left+='<div class="card"><h4>🥾 '+esc(d.alternatives.title)+'</h4><table class="alt-t"><tr><th>Trek</th><th class="r">Dist</th><th class="r">Tiempo</th><th>Dif</th><th>Estado</th></tr>'+d.alternatives.items.map(function(it){var rec=it.name===d.alternatives.recommended;var closed=/cerrad/i.test(it.status);return '<tr class="'+(rec?'rec':'')+(closed?' cl':'')+'"><td>'+(rec?'★ ':'')+esc(it.name)+'</td><td class="r">'+esc(it.dist)+'</td><td class="r">'+esc(it.hours)+'</td><td>'+esc(it.diff)+'</td><td>'+esc(it.status)+'</td></tr>';}).join('')+'</table>'+(d.alternatives.note?'<p style="font-size:8.5px;color:#5a7183;margin-top:6px;font-style:italic;line-height:1.35">'+esc(d.alternatives.note)+'</p>':'')+'</div>';
    if(d.alerts&&d.alerts.length) left+='<div class="card"><h4>⚠️ Alertas & operativa</h4><ul class="alerts">'+d.alerts.map(function(a){return '<li>'+esc(a)+'</li>';}).join("")+'</ul></div>';

    var lodge = d.lodging ? '<div class="card" style="'+(/sin reservar|por confirmar/i.test(d.lodging.nights||'')?'background:#fff8f1;border-color:#ffe0c2':'background:#eef6f9;border-color:#d6e6ee')+'"><h4>🚐 Alojamiento · casa rodante</h4><div class="kv"><div class="r"><b>'+esc(d.lodging.where)+(d.lodging.nights?' · '+esc(d.lodging.nights):'')+'</b>'+(d.lodging.detail?esc(d.lodging.detail):'')+'</div></div>'+(d.lodging.options?'<div class="chips" style="margin-top:6px">'+d.lodging.options.map(function(o){return '<span class="chip">⛺ '+esc(o)+'</span>';}).join('')+'</div>':'')+'</div>' : '';
    var right=lodge+'<div class="card"><h4>🍽️ Comida</h4><div class="kv">'+
        '<div class="r"><b>Desayuno</b>'+esc(d.food.breakfast)+'</div>'+
        '<div class="r"><b>Almuerzo en ruta</b>'+esc(d.food.lunch)+'</div>'+
        '<div class="r"><b>Cena</b>'+esc(d.food.dinner)+'</div>'+
        '<div class="r"><b>Best local dish</b>'+esc(d.food.bestDish)+'</div></div></div>'+
      '<div class="card"><h4>⛽ Logística</h4><div class="kv">'+
        '<div class="r"><b>Combustible</b>'+esc(d.logistics.gas.join(" "))+'</div>'+
        '<div class="r"><b>Provisiones</b>'+esc(d.logistics.supplies.join(" "))+'</div></div></div>'+
      '<div class="card"><h4>🌦️ Clima & ropa</h4><div class="wchip"><div class="tmp">'+esc(d.weather.tempHigh)+'°</div><div class="wd">'+esc(d.weather.conditions)+' · máx '+esc(d.weather.tempHigh)+'° / mín '+esc(d.weather.tempLow)+'°<br><span style="color:#5a7183;font-weight:500">'+esc(d.weather.summary)+'</span></div></div><div class="chips">'+d.clothing.map(function(c){return '<span class="chip">'+esc(c)+'</span>';}).join("")+'</div></div>'+
      '<div class="card"><h4>📸 Fotografía</h4><div class="kv"><div class="r"><b>Golden hour</b>'+esc(d.photography.goldenHour)+'</div><div class="r"><b>Spots</b>'+esc(d.photography.spots.join(" · "))+'</div></div></div>';

    P("",
      '<div class="day-hero"><img src="'+esc(pic)+'" alt=""><div class="veil"></div>'+
      '<div class="num"><b>'+d.n+'</b></div>'+
      '<div class="metrics"><div class="m"><b>'+esc(String(d.drivingKm))+'</b><small>km</small></div><div class="m"><b>'+esc(d.drivingTime.replace("≈",""))+'</b><small>manejo</small></div>'+(d.hikeName?'<div class="m"><b>'+esc(d.hikingTime)+'</b><small>hike</small></div>':"")+'</div>'+
      '<div class="lbl"><span class="badge">Día '+d.n+' · '+esc(d.dow)+' '+esc(d.date)+' · '+esc(d.badge)+'</span><h2>'+esc(d.title)+'</h2><div class="rt">'+esc(d.route)+'</div></div></div>'+
      '<div class="day-summary">'+esc(d.summary)+'</div>'+
      '<div class="day-cols"><div>'+left+'</div><div>'+right+'</div></div>'+
      footer("La ruta día a día"));
  });

  /* ATTRACTIONS (2 pages) */
  var attrs=D.locations.filter(function(l){return l.type!=="city";});
  chunk(attrs,9).forEach(function(grp,gi){
    P("",'<div class="eyebrow">03 · Atracciones principales</div><h1 class="sec-title">'+(gi===0?"Los lugares del viaje":"Atracciones · continuación")+'</h1><div class="divider"></div>'+
      '<div class="gal">'+grp.map(function(l){return '<div class="gcard"><div class="im"><span class="tp">'+esc(TYPE[l.type]||l.type)+'</span><img src="'+esc(l.img)+'" alt="'+esc(l.name)+'"></div><div class="bd"><h4>'+esc(l.name)+'</h4><p>'+esc(l.short)+'</p><div class="mt"><span>'+esc(l.difficulty||"—")+'</span><span>⏱ '+esc(shortDur(l.duration))+'</span></div></div></div>';}).join("")+'</div>'+
      footer("Atracciones principales"));
  });

  /* CHECKLISTS */
  P("",'<div class="eyebrow">04 · Preparación</div><h1 class="sec-title">Checklist de equipaje</h1><div class="divider"></div>'+
    '<div class="check-grid">'+D.packing.map(function(c){return '<div class="check"><h4>'+esc(c.category)+'</h4><ul>'+c.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join("")+'</ul></div>';}).join("")+'</div>'+
    footer("Checklists de equipaje"));

  /* BUDGET */
  var b=D.budget;
  var bTot=(typeof b.total==="number")?b.total:b.items.reduce(function(s,i){return s+(i.est||0);},0);
  P("",'<div class="eyebrow">05 · Presupuesto</div><h1 class="sec-title">Presupuesto estimado</h1><div class="divider"></div>'+
    '<p class="sec-lead" style="margin-bottom:14px">Cifras aproximadas, solo como referencia.</p>'+
    '<table class="btable"><thead><tr><th>Concepto</th><th class="r">Estimado ('+b.currency+')</th></tr></thead><tbody>'+
    b.items.map(function(i){return '<tr><td>'+esc(i.concept)+'</td><td class="r">≈ $'+num(i.est)+'</td></tr>';}).join("")+
    '<tr class="total"><td>Total aproximado (4 viajeros, sin vuelos)</td><td class="r">≈ $'+num(bTot)+'</td></tr>'+
    '</tbody></table><p class="budget-note">'+esc(b.note)+'</p>'+
    footer("Presupuesto estimado"));

  /* RESTAURANTS */
  P("",'<div class="eyebrow">06 · Gastronomía</div><h1 class="sec-title">Restaurantes por ciudad</h1><div class="divider"></div>'+
    '<div class="two">'+D.restaurants.map(function(r){return '<div class="rbox"><h4>'+esc(r.city)+'</h4><ul>'+r.places.map(function(p){return '<li>🍽️ '+esc(p)+'</li>';}).join("")+'</ul></div>';}).join("")+'</div>'+
    footer("Restaurantes por ciudad"));

  /* RECOMMENDATIONS (split) */
  chunk(D.recommendations,4).forEach(function(grp,gi){
    P("",'<div class="eyebrow">07 · Recomendaciones & seguridad</div><h1 class="sec-title">'+(gi===0?"Antes de salir":"Recomendaciones · continuación")+'</h1><div class="divider"></div>'+
      grp.map(function(r){return '<div class="rec"><h4>'+r.icon+' '+esc(r.title)+'</h4><ul>'+r.items.map(function(i){return '<li>'+esc(i)+'</li>';}).join("")+'</ul></div>';}).join("")+
      footer("Recomendaciones & seguridad"));
  });

  /* VIDEOS / QR */
  function fmtv(n){return n>=1000000?(n/1000000).toFixed(1).replace(/\.0$/,'')+' M vistas':n>=1000?Math.round(n/1000)+' k vistas':n+' vistas';}

  /* EXTRAS · paradas opcionales */
  if(D.extras&&D.extras.length){
    var xByDay={}; D.extras.forEach(function(e){(xByDay[e.day]=xByDay[e.day]||[]).push(e);});
    var xGroups=Object.keys(xByDay).sort(function(a,b){return a-b;}).map(function(day){
      var di=D.days.find(function(d){return d.n===+day;})||{date:'',title:''};
      var cards=xByDay[day].map(function(e){return '<div class="xcard"><div class="xtop"><b>'+esc(e.name)+'</b><span>'+esc(e.timeNeeded)+'</span></div><p>'+esc(e.description)+'</p><div class="xhow"><b>Cómo verlo:</b> '+esc(e.howToVisit)+'</div></div>';}).join('');
      return '<div class="xgroup"><div class="xday">Día '+day+' · '+esc(di.date)+' — '+esc(di.title)+'</div><div class="xcards">'+cards+'</div></div>';
    });
    P("",'<div class="eyebrow">08 · Paradas opcionales</div><h1 class="sec-title">Extras para sumar a la ruta</h1><div class="divider"></div>'+xGroups.join('')+footer('Paradas opcionales'));
  }

  P("",'<div class="eyebrow">09 · Videos</div><h1 class="sec-title">Míralo antes de vivirlo</h1><div class="divider"></div>'+
    '<p class="sec-lead">Escanea los códigos para ver cada video en YouTube (elegidos por número de vistas).</p>'+
    '<div class="qr-grid" style="margin-top:14px">'+D.videos.map(function(v){return '<div class="qr"><img src="assets/img/qr/'+esc(v.id)+'.png" alt="QR: '+esc(v.title)+'"><div class="tp">'+esc(v.topic)+'</div><h5>'+esc(v.title)+'</h5><div class="ch">▷ '+esc(v.channel)+(v.views?' · '+fmtv(v.views):'')+'</div></div>';}).join("")+'</div>'+
    footer("Videos · códigos QR"));

  /* BACK COVER */
  P("bleed back",'<div class="glyph">🏔️</div><h2>Nos vemos en las Rocosas.</h2><div class="line"></div><p>'+esc(D.meta.title)+' · '+esc(D.meta.dates)+'</p><p style="margin-top:6px;font-size:9px;color:rgba(255,255,255,.5)">Fotografía: Wikimedia Commons · Cartografía: OpenStreetMap / CARTO</p>');

  doc.innerHTML=pages.join("");

  function footer(sec){return '<div class="pnum"><span>'+esc(D.meta.title)+'</span><span>'+esc(sec)+'</span></div>';}
  function chunk(a,n){var o=[];for(var i=0;i<a.length;i+=n)o.push(a.slice(i,i+n));return o;}
  function num(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,".");}
  function shortDur(s){return String(s).split("·")[0].trim();}
  function heroImg(d){
    // prefer a scenic hike/lake/glacier stop for the day hero
    var order=["trek","lake","glacier","waterfall","mountain","city"];
    var stops=(d.routeStops||[]).map(function(id){return (D.locations.find(function(l){return l.id===id;}));}).filter(Boolean);
    for(var t=0;t<order.length;t++){for(var i=0;i<stops.length;i++){if(stops[i].type===order[t])return stops[i].img;}}
    return stops.length?stops[stops.length-1].img:"assets/img/photos/hero_2.jpg";
  }
})();
</script>
</body>
</html>
